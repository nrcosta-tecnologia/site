document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"1c46bd77-4c20-43e8-96d6-a947af8d47ea\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"1db4b779-9bcc-4ccd-a5bb-a63733e25e4a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"35dcdac8-434b-4b78-84b2-8332d111e92e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"1c46bd77-4c20-43e8-96d6-a947af8d47ea\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --bg:        #F6F3EC;\n    --bg-warm:   #EFEBE0;\n    --paper:    #FBF9F4;\n    --ink:       #27364D;     /* navy do logo */\n    --ink-deep:  #142036;\n    --ink-2:     #2A3A55;\n    --ink-3:     #3D4E68;\n    --muted:     #5A6A80;\n    --line:      #C9C2B0;\n    --line-soft: #DDD6C3;\n    --gold:      #4EB088;\n    --gold-deep: #214A39;\n    --green:     #214A39;        /* teal do logo */\n    --green-deep:#163829;\n    --red:       #B0432A;\n\n    --ff-display: \"Space Grotesk\", ui-sans-serif, system-ui, sans-serif;\n    --ff-body:    \"Manrope\", ui-sans-serif, system-ui, sans-serif;\n    --ff-mono:    \"JetBrains Mono\", ui-monospace, monospace;\n\n    --max: 1240px;\n    --gutter: clamp(20px, 4vw, 56px);\n  }\n\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{\n    font-family: var(--ff-body);\n    background: var(--bg);\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n    font-size: 16px;\n    line-height: 1.5;\n  }\n  a{color:inherit;text-decoration:none}\n  img,svg{display:block;max-width:100%}\n  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}\n  ::selection{background:var(--ink); color:var(--bg)}\n\n  .wrap{\n    max-width: var(--max);\n    margin: 0 auto;\n    padding-left: var(--gutter);\n    padding-right: var(--gutter);\n  }\n\n  /* ───────── NAV ───────── */\n  .nav{\n    position: sticky; top:0; z-index: 50;\n    background: color-mix(in oklab, var(--bg) 92%, transparent);\n    backdrop-filter: blur(10px);\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .nav-row{\n    display:flex; align-items:center; justify-content:space-between;\n    height: 72px;\n  }\n  .brand{display:flex; align-items:center; gap:12px; flex: 0 0 auto}\n  .brand img{height: 34px; width: auto; display:block}\n  .brand-foot img{height: 28px; width: auto; display:block}\n\n  .nav-links{display:flex; gap: 36px; align-items:center}\n  .nav-links a{\n    font-size: 14px; color: var(--ink-3);\n    transition: color .2s;\n  }\n  .nav-links a:hover{color: var(--ink)}\n  .nav-cta{\n    font-family: var(--ff-display);\n    font-size: 14px; font-weight: 500;\n    padding: 10px 18px;\n    border:1px solid var(--ink);\n    border-radius: 999px;\n    transition: background .2s, color .2s;\n  }\n  .nav-cta:hover{background: var(--ink); color: var(--bg)}\n  @media (max-width: 820px){\n    .nav-links a:not(.nav-cta){display:none}\n  }\n\n  /* ───────── SECTION SHELL ───────── */\n  section{padding-top: clamp(72px, 9vw, 128px); padding-bottom: clamp(72px, 9vw, 128px)}\n  .eyebrow{\n    font-family: var(--ff-mono);\n    font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em;\n    color: var(--ink-3);\n    display:inline-flex; align-items:center; gap:10px;\n    margin-bottom: 28px;\n  }\n  .eyebrow::before{\n    content:\"\"; width: 28px; height:1px; background: var(--ink-3);\n  }\n  h1,h2,h3,h4{font-family: var(--ff-display); font-weight: 500; letter-spacing: -0.02em; margin: 0}\n  h1{font-size: clamp(40px, 6.4vw, 84px); line-height: 1.02; font-weight:500}\n  h2{font-size: clamp(32px, 4.6vw, 56px); line-height: 1.05}\n  h3{font-size: clamp(22px, 2.2vw, 28px); line-height: 1.15}\n  .lede{font-size: clamp(17px, 1.4vw, 20px); line-height: 1.55; color: var(--ink-2); max-width: 56ch}\n\n  /* ───────── HERO ───────── */\n  .hero{position:relative; overflow:hidden; padding-top: 72px;}\n  .hero-grid{\n    display:block;\n    min-height: clamp(480px, 68vh, 680px);\n  }\n  .hero-text h1{max-width: 18ch}\n\n  .hero h1 .em{color: var(--gold-deep); font-style: normal}\n  .hero h1 .crossed{position:relative; white-space: nowrap}\n  .hero h1 .crossed::after{\n    content:\"\"; position:absolute; left:-2%; right:-2%; top:54%;\n    height:2px; background: var(--ink);\n  }\n  .hero-sub{margin-top: 28px; max-width: 52ch; font-size: clamp(17px, 1.45vw, 20px); color: var(--ink-2); line-height: 1.55}\n\n  .hero-cta-row{margin-top: 40px; display:flex; gap: 14px; flex-wrap:wrap; align-items:center}\n  .btn{\n    font-family: var(--ff-display); font-weight: 500; font-size: 15px;\n    padding: 16px 24px;\n    border-radius: 999px;\n    display:inline-flex; align-items:center; gap: 10px;\n    transition: transform .2s, background .2s, color .2s, box-shadow .2s;\n  }\n  .btn-primary{background: var(--ink); color: var(--bg)}\n  .btn-primary:hover{background: var(--ink-2); transform: translateY(-1px)}\n  .btn-ghost{color: var(--ink); border:1px solid var(--ink)}\n  .btn-ghost:hover{background: var(--ink); color: var(--bg)}\n  .btn .arr{\n    width: 18px; height:18px; display:inline-grid; place-items:center;\n    transition: transform .2s;\n  }\n  .btn:hover .arr{ transform: translateX(3px) }\n\n  .hero-meta{\n    margin-top: 56px;\n    display:flex; gap: 48px; flex-wrap: wrap;\n    border-top:1px solid var(--line-soft);\n    padding-top: 28px;\n    font-family: var(--ff-mono); font-size: 12px; letter-spacing: .08em; text-transform: uppercase;\n    color: var(--muted);\n  }\n  .hero-meta b{color: var(--ink); font-weight:500; display:block; font-family: var(--ff-display); font-size: 22px; letter-spacing: -0.01em; text-transform: none; margin-bottom: 4px;}\n\n  /* hero visual — diagrama */\n  .hero-visual{\n    align-self: stretch; position: relative;\n    border: 1px solid var(--line);\n    border-radius: 4px;\n    background:\n      radial-gradient(circle at 20% 20%, rgba(11,30,45,.04), transparent 60%),\n      linear-gradient(180deg, var(--paper), var(--bg-warm));\n    min-height: 520px;\n    overflow: hidden;\n  }\n  .hv-label{\n    position:absolute; top: 16px; left:16px; right:16px;\n    display:flex; justify-content: space-between; align-items:center;\n    font-family: var(--ff-mono); font-size: 11px; color: var(--muted);\n    letter-spacing: .12em; text-transform: uppercase;\n  }\n  .hv-label .dots{display:inline-flex; gap:6px}\n  .hv-label .dots i{width:8px; height:8px; border-radius:50%; background: var(--line); display:block}\n  .hv-label .dots i:nth-child(1){background: var(--gold)}\n  .hv-label .dots i:nth-child(2){background: var(--green)}\n\n  .diagram{position:absolute; inset: 56px 28px 28px 28px}\n  .diagram svg{width:100%; height:100%}\n\n  .hero-floor id rgba(255,255,255,.12);\n  }\n  .cta-channel:hover .cta-val{color: var(--gold)}\n  .cta-channel span{font-family:var(--ff-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.55)}\n  .cta-val{font-family: var(--ff-display); font-size: clamp(18px, 1.8vw, 22px); letter-spacing: -0.01em; transition: color .2s; display:inline-flex; gap:10px; align-items:center}\n\n  .cta-grid-bg{\n    position:absolute; inset:0;\n    background-image:\n      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);\n    background-size: 64px 64px;\n    pointer-events:none;\n  }\n  .cta-blob{\n    position:absolute; right: -120px; bottom: -120px;\n    width: 480px; height: 480px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 30% 30%, rgba(78,176,136,.35), transparent 60%);\n    filter: blur(20px);\n    pointer-events: none;\n  }\n\n  /* ───────── FOOTER ───────── */\n  footer{\n    background: var(--ink);\n    color: rgba(255,255,255,.55);\n    border-top:1px solid rgba(255,255,255,.08);\n    padding: 32px 0 40px;\n    font-family: var(--ff-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase;\n  }\n  .foot-row{display:flex; justify-content: space-between; gap: 24px; flex-wrap: wrap}\n  .foot-row .brand{color: var(--paper)}\n\n  /* hero diagram tweaks */\n  .node-label{font-family: var(--ff-mono); font-size: 10px; fill: var(--ink-2); letter-spacing: .1em; text-transform: uppercase}\n  .node-title{font-family: var(--ff-display); font-size: 13px; fill: var(--ink); font-weight: 500}\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header class=\"nav\">\n  <div class=\"wrap nav-row\">\n    <a class=\"brand\" href=\"#top\" aria-label=\"NR Costa Tecnologia — início\">\n      <img src=\"14f4d84c-3db9-4bde-96d6-877768fe7b0b\" alt=\"NR Costa Tecnologia\">\n    <\u002Fa>\n    <nav class=\"nav-links\">\n      <a href=\"#sobre\">Sobre<\u002Fa>\n      <a href=\"#solucoes\">Soluções<\u002Fa>\n      <a href=\"#ia\">IA Aplicada<\u002Fa>\n      <a href=\"#setores\">Setores<\u002Fa>\n      <a href=\"#contato\" class=\"nav-cta\">Fale com a gente →<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ═══════════════ HERO ═══════════════ -->\n<section class=\"hero\" id=\"top\">\n  <div class=\"wrap\">\n    <div class=\"hero-grid\">\n      <div class=\"hero-text\">\n        <div class=\"eyebrow\">SAP B1 · Software · IA Aplicada<\u002Fdiv>\n        <h1>\n          Do <span class=\"em\">SAP<\u002Fspan> à<br>\n          Inteligência Artificial —<br>\n          tecnologia que entrega <span class=\"em\">resultado.<\u002Fspan>\n        <\u002Fh1>\n        <p class=\"hero-sub\">\n          Somos uma empresa enxuta com bagagem de gente grande. Implementamos SAP Business One,\n          desenvolvemos software sob demanda, integramos sistemas e aplicamos IA onde ela\n          realmente resolve. Sem hype, sem intermediários — direto ao ponto.\n        <\u002Fp>\n        <div class=\"hero-cta-row\">\n          <a class=\"btn btn-primary\" href=\"#contato\">\n            Fale com a gente\n            <span class=\"arr\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M1 7h12M8 2l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"square\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n          <\u002Fa>\n          <a class=\"btn btn-ghost\" href=\"#solucoes\">Ver soluções<\u002Fa>\n        <\u002Fdiv>\n\n        <div class=\"hero-meta\">\n          <div><b>SAP B1<\u002Fb>Consultoria, suporte e addons fiscais<\u002Fdiv>\n          <div><b>Custom<\u002Fb>Software sob demanda end-to-end<\u002Fdiv>\n          <div><b>IA<\u002Fb>Agentes, automações e análise<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div class=\"hero-floor\">\n      <span>↓ Continue rolando<\u002Fspan>\n      <span>\n        <span>Bagagem real<\
